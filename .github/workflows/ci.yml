name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all-features

  docs:
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc --no-deps
      - run: echo '<meta http-equiv="refresh" content="0; url=taudio">' > ./target/doc/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./target/doc

      - id: deployment
        uses: actions/deploy-pages@v4
